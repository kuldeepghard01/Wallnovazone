<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WallNovaZone</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

header {
    background: linear-gradient(90deg, #06b6d4, #9333ea);
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

.search-box {
    padding: 10px;
    text-align: center;
}

.search-box input {
    width: 90%;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

nav {
    display: flex;
    overflow-x: auto;
    background: #1e293b;
}

nav button {
    padding: 10px;
    border: none;
    background: none;
    color: white;
    cursor: pointer;
}

nav button:hover {
    background: #06b6d4;
}

.container {
    padding: 10px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
}

.card {
    background: #1e293b;
    border-radius: 10px;
    overflow: hidden;
}

.card img, .card video {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

.card button {
    width: 100%;
    padding: 8px;
    border: none;
    background: #06b6d4;
    color: white;
    cursor: pointer;
}

footer {
    text-align: center;
    padding: 10px;
    background: #1e293b;
}
#previewBox {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    justify-content:center;
    align-items:center;
    z-index:999;

}
.iphone {
    width: 300px;
    height: 620px;
    border: 8px solid black;
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    background: black;
}

.iphone img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Status bar */
.status-bar {
    position: absolute;
    top: 5px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 10px;
    font-size: 14px;
    color: white;
    z-index: 2;
}

/* Apps grid (middle icons) */
.apps-grid {
    position: absolute;
    top: 80px;
    width: 100%;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 25px;
    text-align: center;
    font-size: 26px;
    z-index: 2;
}

/* Bottom dock */
.dock {
    position: absolute;
    bottom: 15px;
    width: 90%;
    left: 5%;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    display: flex;
    justify-content: space-around;
    padding: 10px;
    font-size: 26px;
    z-index: 2;
}

/* Close button */
.close-btn {
    position: absolute;
    top: 20px;
    right: 20px;

}
</style>
</head>

<body>

<header>🔥 WallNovaZone</header>

<div class="search-box">
<input type="text" id="search" placeholder="Search wallpapers...">
</div>

<nav>
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('gaming')">Gaming</button>
<button onclick="filterCategory('nature')">Nature</button>
<button onclick="filterCategory('cars')">Cars</button>
<button onclick="filterCategory('amoled')">AMOLED</button>
<button onclick="filterCategory('live')">Live</button>
</nav>

<div class="container" id="wallpapers"></div>

<!-- Preview -->
<div id="previewBox">
    <div class="iphone">

        <!-- Status Bar -->
        <div class="status-bar">
            <span>9:41</span>
            <span>📶 🔋</span>
        </div>

        <!-- Wallpaper -->
        <img id="previewImg">

        <!-- Apps Grid -->
        <div class="apps-grid">
            <span>📞</span>
            <span>💬</span>
            <span>📷</span>
            <span>🎵</span>

            <span>💾</span>
            <span>📁</span>
            <span>🛒</span>
            <span>📺</span>
        </div>

        <!-- Dock -->
        <div class="dock">
            <span>📞</span>
            <span>💬</span>
            <span>🌐</span>
            <span>📅</span>
        </div>

    </div>

    <button onclick="closePreview()" class="close-btn">❌</button>
</div>

<footer>© 2026 WallNovaZone</footer>

<script>

const wallpapers = [

{category:"gaming", img:"https://images.unsplash.com/photo-1614680376573-df3480f0c6ff?auto=format&fit=crop&w=1080&q=80"},
{category:"gaming", img:"https://images.unsplash.com/photo-1606813907291-d86efa9b94db?auto=format&fit=crop&w=1080&q=80"},

{category:"nature", img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1080&q=80"},
{category:"nature", img:"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1080&q=80"},

{category:"cars", img:"https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1080&q=80"},
{category:"cars", img:"https://images.unsplash.com/photo-1493238792000-8113da705763?auto=format&fit=crop&w=1080&q=80"},

{category:"amoled", img:"https://images.unsplash.com/photo-1518779578993-ec3579fee39f?auto=format&fit=crop&w=1080&q=80"},
{category:"amoled", img:"https://images.unsplash.com/photo-1500534623283-312aade485b7?auto=format&fit=crop&w=1080&q=80"},

{category:"live", img:"https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif"},
{category:"live", img:"https://media.giphy.com/media/xT9IgzoKnwFNmISR8I/giphy.gif"}

];

let current = "all";
let id = 0;

function display() {
    let container = document.getElementById("wallpapers");
    container.innerHTML = "";
    id = 0;

    wallpapers.forEach(w => {
        if (current === "all" || w.category === current) {

            let liked = localStorage.getItem("liked_"+id);
            let likeText = liked ? "💖 Liked" : "❤️ Like";

            let div = document.createElement("div");
            div.className = "card " + w.category;

            div.innerHTML = `
                <img src="${w.img}" onclick="openPreview('${w.img}')">
                <button onclick="download('${w.img}')">⬇️ Download</button>
                <button onclick="like(this, ${id})">${likeText}</button>
            `;

            container.appendChild(div);
            id++;
        }
    });
}

function filterCategory(cat) {
    current = cat;
    display();
}

function like(btn, id) {
    let liked = localStorage.getItem("liked_"+id);

    if (liked) {
        localStorage.removeItem("liked_"+id);
        btn.innerHTML = "❤️ Like";
    } else {
        localStorage.setItem("liked_"+id, true);
        btn.innerHTML = "💖 Liked";
    }
}

function openPreview(img) {
    document.getElementById("previewBox").style.display = "flex";
    document.getElementById("previewImg").src = img;
}

function closePreview() {
    document.getElementById("previewBox").style.display = "none";
}

function download(url) {
    fetch(url)
    .then(res => res.blob())
    .then(blob => {
        let a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "wallpaper.jpg";
        a.click();
    });
}

// search
document.getElementById("search").addEventListener("keyup", function() {
    let val = this.value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        card.style.display = card.className.includes(val) ? "block" : "none";
    });
});

display();

</script>

</body>
</html>
