    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WallNovaZone</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* HEADER */
header {
    padding: 15px;
    text-align: center;
    font-size: 22px;
    background: linear-gradient(to right, #00c6ff, #0072ff);
}

/* SEARCH */
.search-box {
    padding: 10px;
}
.search-box input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
}

/* CATEGORY */
.categories {
    display: flex;
    overflow-x: auto;
}
.categories button {
    margin: 5px;
    padding: 10px;
}

/* GRID */
#wallpapers {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 10px;
    padding: 10px;
}

.card {
    background: #1e293b;
    border-radius: 10px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.btn {
    background: #06b6d4;
    padding: 10px;
    text-align: center;
    cursor: pointer;
}

/* PREVIEW */
#previewBox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
}

/* IPHONE */
.iphone {
    width: 300px;
    height: 600px;
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    background: black;
}

/* IMAGE FIX 🔥 */
.iphone img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* STATUS */
.status-bar {
    position: absolute;
    top: 10px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 15px;
    z-index: 2;
}

/* APPS */
.apps-grid {
    position: absolute;
    top: 80px;
    width: 100%;
    display: grid;
    grid-template-columns: repeat(4,1fr);
    text-align: center;
    font-size: 25px;
    z-index: 2;
}

/* DOCK */
.dock {
    position: absolute;
    bottom: 10px;
    width: 90%;
    left: 5%;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    display: flex;
    justify-content: space-around;
    padding: 10px;
    z-index: 2;
}

/* CLOSE */
.close-btn {
    position: absolute;
    right: 20px;
    top: 20px;
    font-size: 20px;
}
</style>
</head>

<body>

<header>🔥 WallNovaZone</header>

<div class="search-box">
<input type="text" id="search" placeholder="Search wallpapers...">
</div>

<div class="categories">
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('cars')">Cars</button>
<button onclick="filterCategory('nature')">Nature</button>
<button onclick="filterCategory('live')">Live</button>
</div>

<div id="wallpapers"></div>

<!-- PREVIEW -->
<div id="previewBox">
    <div class="iphone">

        <div class="status-bar">
            <span>9:41</span>
            <span>📶 🔋</span>
        </div>

        <img id="previewImg">

        <div class="apps-grid">
            <span>📞</span>
            <span>💬</span>
            <span>📷</span>
            <span>🎵</span>
            <span>🌐</span>
            <span>📁</span>
            <span>🛒</span>
            <span>📺</span>
        </div>

        <div class="dock">
            <span>📞</span>
            <span>💬</span>
            <span>🌐</span>
            <span>📷</span>
        </div>

    </div>

    <button class="close-btn" onclick="closePreview()">❌</button>
</div>

<script>

let current = "all";

let wallpapers = [
{category:"cars", img:"https://images.unsplash.com/photo-1503376780353-7e6692767b70"},
{category:"cars", img:"https://images.unsplash.com/photo-1494976388531-d1058494cdd8"},
{category:"nature", img:"https://images.unsplash.com/photo-1501785888041-af3ef285b470"},
{category:"nature", img:"https://images.unsplash.com/photo-1470770841072-f978cf4d019e"},
{category:"live", img:"https://media.giphy.com/media/3o6ZtpxSZbQRRnwCKQ/giphy.gif"}
];

function display(){
let container = document.getElementById("wallpapers");
container.innerHTML = "";

wallpapers.forEach(w=>{
if(current=="all" || w.category==current){

let div = document.createElement("div");
div.className="card "+w.category;

div.innerHTML=`
<img src="${w.img}" onclick="openPreview('${w.img}')">
<div class="btn" onclick="download('${w.img}')">⬇ Download</div>
<div class="btn" onclick="like(this)">❤️ Like</div>
`;

container.appendChild(div);
}
});
}

function filterCategory(cat){
current=cat;
display();
}

function openPreview(img){
document.getElementById("previewBox").style.display="flex";
document.getElementById("previewImg").src=img;
}

function closePreview(){
document.getElementById("previewBox").style.display="none";
}

function download(url){
let a=document.createElement("a");
a.href=url;
a.download="wallpaper.jpg";
a.click();
}

function like(btn){
btn.innerHTML="💖 Liked";
}

display();

</script>

</body>
</html>
