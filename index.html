<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WallNovaZone</title><style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white}
header{padding:15px;text-align:center;font-size:22px;background:linear-gradient(45deg,#0ea5e9,#9333ea)}

.search-box{padding:10px}
.search-box input{width:100%;padding:10px;border-radius:10px;border:none}

.categories{display:flex;overflow:auto;padding:10px;gap:10px}
.categories button{padding:8px 15px;border:none;border-radius:20px;background:#1e293b;color:white}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px}
.card{background:#1e293b;border-radius:15px;overflow:hidden}
.card img{width:100%}
.card button{width:100%;padding:10px;border:none;background:#06b6d4;color:white}

/* PREVIEW */
#previewBox{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;justify-content:center;align-items:center;z-index:9999
}

.iphone{
width:300px;height:620px;border:8px solid black;border-radius:40px;
overflow:hidden;position:relative;background:black
}

.notch{
position:absolute;top:0;left:50%;transform:translateX(-50%);
width:140px;height:25px;background:black;border-bottom-left-radius:20px;border-bottom-right-radius:20px;z-index:3
}

.status-bar{
position:absolute;top:30px;width:100%;display:flex;justify-content:space-between;padding:0 20px;font-size:14px;z-index:3
}

/* LOCK SCREEN STYLE */
.lock-screen{
position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
text-align:center;z-index:3
}

.lock-time{font-size:40px;font-weight:bold}
.lock-date{font-size:14px;opacity:0.8}

.iphone img{
position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:1
}

.close-btn{
position:absolute;top:20px;right:20px;background:white;color:black;border:none;padding:5px 10px;border-radius:10px
}

</style></head><body><header>🔥 WallNovaZone</header><div class="search-box">
<input type="text" id="search" placeholder="Search wallpapers...">
</div><div class="categories">
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('gaming')">Gaming</button>
<button onclick="filterCategory('nature')">Nature</button>
<button onclick="filterCategory('cars')">Cars</button>
<button onclick="filterCategory('amoled')">AMOLED</button>
<button onclick="filterCategory('live')">Live</button>
</div><div class="grid" id="wallpapers"></div><!-- PREVIEW --><div id="previewBox">
<div class="iphone"><div class="notch"></div><div class="status-bar">
<span>9:41</span>
<span>📶 🔋</span>
</div><img id="previewImg"><div class="lock-screen">
<div class="lock-time">9:41</div>
<div class="lock-date">Tuesday, July 17</div>
</div></div><button onclick="closePreview()" class="close-btn">❌</button>

</div><script>
let current="all";

let wallpapers=[
{category:"cars",img:"https://images.unsplash.com/photo-1503376780353-7e6692767b70"},
{category:"nature",img:"https://images.unsplash.com/photo-1501785888041-af3ef285b470"},
{category:"gaming",img:"https://images.unsplash.com/photo-1542751371-adc38448a05e"},
{category:"amoled",img:"https://images.unsplash.com/photo-1519681393784-d120267933ba"},
{category:"live",img:"https://media.giphy.com/media/3oEjI6SIIHBdRxXI40/giphy.gif"},
];

function display(){
let container=document.getElementById("wallpapers");
container.innerHTML="";

wallpapers.forEach((w,i)=>{
if(current=="all"||w.category==current){
let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<img src="${w.img}" onclick="openPreview('${w.img}')">
<button onclick="download('${w.img}')">⬇ Download</button>
<button onclick="like(this,${i})">❤️ Like</button>
`;

container.appendChild(div);
}
});
}

function filterCategory(cat){current=cat;display();}

function openPreview(img){
document.getElementById("previewBox").style.display="flex";
document.getElementById("previewImg").src=img;
}

function closePreview(){
document.getElementById("previewBox").style.display="none";}

function download(url){
let a=document.createElement("a");
a.href=url;a.download="wallpaper";a.click();
}

function like(btn,id){
let liked=localStorage.getItem("liked_"+id);
if(liked){localStorage.removeItem("liked_"+id);btn.innerHTML="❤️ Like";}
else{localStorage.setItem("liked_"+id,true);btn.innerHTML="💖 Liked";}
}

// search

document.getElementById("search").addEventListener("keyup",function(){
let val=this.value.toLowerCase();
let cards=document.querySelectorAll(".card");
cards.forEach(card=>{
card.style.display=card.innerText.toLowerCase().includes(val)?"block":"none";
});
});

display();
</script></body>
</html>
