<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WallNovaZone - HD Wallpapers</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

header {
    background: linear-gradient(90deg, #06b6d4, #9333ea);
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

.search-box {
    padding: 10px;
    text-align: center;
}

.search-box input {
    width: 90%;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

nav {
    display: flex;
    overflow-x: auto;
    background: #1e293b;
}

nav button {
    padding: 10px;
    border: none;
    background: none;
    color: white;
    cursor: pointer;
}

nav button:hover {
    background: #06b6d4;
}

.container {
    padding: 10px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
}

.card {
    background: #1e293b;
    border-radius: 10px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

.card button {
    width: 100%;
    padding: 8px;
    border: none;
    background: #06b6d4;
    color: white;
    cursor: pointer;
}

footer {
    text-align: center;
    padding: 10px;
    background: #1e293b;
}
</style>

</head>

<body>

<header>🔥 WallNovaZone</header>

<div class="search-box">
<input type="text" id="search" placeholder="Search wallpapers...">
</div>

<nav>
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('gaming')">Gaming</button>
<button onclick="filterCategory('nature')">Nature</button>
<button onclick="filterCategory('cars')">Cars</button>
<button onclick="filterCategory('amoled')">AMOLED</button>
<button onclick="filterCategory('quotes')">Quotes</button>
</nav>

<div class="container" id="wallpapers"></div>

<footer>© 2026 WallNovaZone</footer>

<script>
const wallpapers = [
{category:"gaming", img:"https://images.unsplash.com/photo-1542751371-adc38448a05e"},
{category:"nature", img:"https://images.unsplash.com/photo-1501785888041-af3ef285b470"},
{category:"nature", img:"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"},
{category:"cars", img:"https://images.unsplash.com/photo-1494976388531-d1058494cdd8"},
{category:"cars", img:"https://images.unsplash.com/photo-1502877338535-766e1452684a"},
{category:"amoled", img:"https://images.unsplash.com/photo-1519681393784-d120267933ba"},
{category:"amoled", img:"https://images.unsplash.com/photo-1520975916090-3105956dac38"},
{category:"quotes", img:"https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d"},
{category:"quotes", img:"https://images.unsplash.com/photo-1492724441997-5dc865305da7"},
{category:"nature", img:"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=2160&q=80"},
{category:"nature", img:"https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=2160&q=80"},

{category:"gaming", img:"https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=2160&q=80"},

{category:"cars", img:"https://images.unsplash.com/photo-1494976388531-d1058494cdd8?auto=format&fit=crop&w=2160&q=80"},
{category:"cars", img:"https://images.unsplash.com/photo-1502877338535-766e1452684a?auto=format&fit=crop&w=2160&q=80"},

{category:"amoled", img:"https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=2160&q=80"},
{category:"amoled", img:"https://images.unsplash.com/photo-1520975916090-3105956dac38?auto=format&fit=crop&w=2160&q=80"},

{category:"quotes", img:"https://images.unsplash.com/photo-1492724441997-5dc865305da7?auto=format&fit=crop&w=2160&q=80"}
    
];

let current = "all";

function display() {
    let container = document.getElementById("wallpapers");
    container.innerHTML = "";

    wallpapers.forEach(w => {
        if (current === "all" || w.category === current) {
            let div = document.createElement("div");
            div.className = "card " + w.category;

            div.innerHTML = `
                <img src="${w.img}">
                <button onclick="download('${w.img}')">Download</button>
            `;
            container.appendChild(div);
        }
    });
}

function filterCategory(cat) {
    current = cat;
    display();
}
    function download(url) {
    const a = document.createElement('a');
    a.href = url;
    a.download = "wallpaper.jpg";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    
}

// search
document.getElementById("search").addEventListener("keyup", function() {
    let val = this.value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        card.style.display = card.className.includes(val) ? "block" : "none";
    });
});

display();
</script>

</body>
</html>
