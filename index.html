<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WallNovaZone - HD Wallpapers</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

header {
    background: linear-gradient(90deg, #06b6d4, #9333ea);
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

.search-box {
    padding: 10px;
    text-align: center;
}

.search-box input {
    width: 90%;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

nav {
    display: flex;
    overflow-x: auto;
    background: #1e293b;
}

nav button {
    padding: 10px;
    border: none;
    background: none;
    color: white;
    cursor: pointer;
}

nav button:hover {
    background: #06b6d4;
}

.container {
    padding: 10px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
}

.card {
    background: #1e293b;
    border-radius: 10px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

.card button {
    width: 100%;
    padding: 8px;
    border: none;
    background: #06b6d4;
    color: white;
    cursor: pointer;
}
<div id="previewBox" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; justify-content:center; align-items:center; z-index:999;">
    <div style="width:300px; height:600px; border:5px solid white; border-radius:20px; overflow:hidden;">
        <img id="previewImg" style="width:100%; height:100%; object-fit:cover;">
    </div>
    <button onclick="closePreview()" style="position:absolute; top:20px; right:20px; padding:10px;">❌</button>
</div>

footer {
    text-align: center;
    padding: 10px;
    background: #1e293b;
}
</style>

</head>

<body>

<header>🔥 WallNovaZone</header>

<div class="search-box">
<input type="text" id="search" placeholder="Search wallpapers...">
</div>

<nav>
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('gaming')">Gaming</button>
<button onclick="filterCategory('nature')">Nature</button>
<button onclick="filterCategory('cars')">Cars</button>
<button onclick="filterCategory('amoled')">AMOLED</button>
<button onclick="filterCategory('quotes')">Quotes</button>
<button onclick="filterCategory('live')">Live</button>
</nav>

<div class="container" id="wallpapers"></div>

<footer>© 2026 WallNovaZone</footer>

<script>
const wallpapers = [
{category:"gaming", img:"https://images.unsplash.com/photo-1542751371-adc38448a05e"},
{category:"nature", img:"https://images.unsplash.com/photo-1501785888041-af3ef285b470"},
{category:"nature", img:"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"},
{category:"cars", img:"https://images.unsplash.com/photo-1494976388531-d1058494cdd8"},
{category:"cars", img:"https://images.unsplash.com/photo-1502877338535-766e1452684a"},
{category:"amoled", img:"https://images.unsplash.com/photo-1519681393784-d120267933ba"},
{category:"amoled", img:"https://images.unsplash.com/photo-1520975916090-3105956dac38"},
{category:"quotes", img:"https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d"},
{category:"quotes", img:"https://images.unsplash.com/photo-1492724441997-5dc865305da7"},
{category:"nature", img:"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=2160&q=80"},
{category:"nature", img:"https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=2160&q=80"},

{category:"gaming", img:"https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=2160&q=80"},

{category:"cars", img:"https://images.unsplash.com/photo-1494976388531-d1058494cdd8?auto=format&fit=crop&w=2160&q=80"},
{category:"cars", img:"https://images.unsplash.com/photo-1502877338535-766e1452684a?auto=format&fit=crop&w=2160&q=80"},

{category:"amoled", img:"https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=2160&q=80"},
{category:"amoled", img:"https://images.unsplash.com/photo-1520975916090-3105956dac38?auto=format&fit=crop&w=2160&q=80"},

{category:"quotes", img:"https://images.unsplash.com/photo-1492724441997-5dc865305da7?auto=format&fit=crop&w=2160&q=80"},
    {category:"live", type:"gif", img:"https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif"},
{category:"live", type:"gif", img:"https://media.giphy.com/media/xT9IgzoKnwFNmISR8I/giphy.gif"},

{category:"live", type:"video", img:"videos/live1.mp4"},
{category:"live", type:"video", img:"videos/live2.mp4"},
    
];

let current = "all";

let id = 0;

function display() {
    let container = document.getElementById("wallpapers");
    container.innerHTML = "";

    wallpapers.forEach(w => {
        if (current === "all" || w.category === current) {

            let div = document.createElement("div");
            div.className = "card " + w.category;

            div.innerHTML = `
                <img src="${w.img}" onclick="openPreview('${w.img}')">
                <button onclick="download('${w.img}')">⬇️ Download</button>
                function like(btn, id) {
    let liked = localStorage.getItem("liked_"+id);

    if (liked) {
        localStorage.removeItem("liked_"+id);
        btn.innerHTML = "❤️ Like";
    } else {
        localStorage.setItem("liked_"+id, true);
        btn.innerHTML = "💖 Liked";
    }
}
            `;

            container.appendChild(div);
            id++;
        }
    });
}

function filterCategory(cat) {
    current = cat;
    display();
}
    function download(url) {
    fetch(url)
        .then(response => response.blob())
        .then(blob => {
            const a = document.createElement('a');
            const objectURL = URL.createObjectURL(blob);
            a.href = objectURL;
            a.download = "wallpaper.jpg";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(objectURL);
        })
        .catch(() => {
            alert("Download failed!");
        });

    
}

// search
document.getElementById("search").addEventListener("keyup", function() {
    let val = this.value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        card.style.display = card.className.includes(val) ? "block" : "none";
    });
});

display();

function like(id) {
    let count = localStorage.getItem("like_"+id) || 0;
    count++;
    localStorage.setItem("like_"+id, count);
    display();
let liked = localStorage.getItem("liked_"+id);

let likeText = liked ? "💖 Liked" : "❤️ Like";
}

function openPreview(img) {
    document.getElementById("previewBox").style.display = "flex";
    document.getElementById("previewImg").src = img;
}

function closePreview() {
    document.getElementById("previewBox").style.display = "none";
}

</script>

</body>
</html>
