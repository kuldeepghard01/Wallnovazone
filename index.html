<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WallNovaZone</title>

<style>

/* BODY */
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* HEADER */
header {
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    background: linear-gradient(45deg,#06b6d4,#9333ea);
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 10px;
    padding: 10px;
}

/* CARD */
.card {
    background: #1e293b;
    border-radius: 15px;
    overflow: hidden;
}

/* IMAGE */
.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* BUTTON */
.btn {
    display: block;
    text-align: center;
    background: #06b6d4;
    padding: 10px;
    text-decoration: none;
    color: white;
}

/* PREVIEW BOX */
#previewBox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

/* IPHONE */
.iphone {
    width: 300px;
    height: 620px;
    border: 8px solid black;
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    background: black;
}

/* NOTCH */
.notch {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 140px;
    height: 25px;
    background: black;
    border-bottom-left-radius: 20px;
    border-bottom-right-radius: 20px;
    z-index: 3;
}

/* IMAGE FULL FIT */
.iphone img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    top: 0;
    left: 0;
    z-index: 1;
}

/* STATUS BAR */
.status-bar {
    position: absolute;
    top: 30px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    font-size: 14px;
    z-index: 2;
}

/* APPS GRID */
.apps-grid {
    position: absolute;
    top: 100px;
    width: 100%;
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 25px;
    text-align: center;
    font-size: 24px;
    z-index: 2;
}

/* DOCK */
.dock {
    position: absolute;
    bottom: 15px;
    width: 90%;
    left: 5%;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    display: flex;
    justify-content: space-around;
    padding: 10px;
    font-size: 24px;
    z-index: 2;
}

/* CLOSE BTN */
.close-btn {
    position: absolute;
    right: 20px;
    top: 20px;
    font-size: 20px;
}

</style>
</head>

<body>

<header>🔥 WallNovaZone</header>

<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" onclick="openPreview(this.src)">
<a class="btn" href="https://images.unsplash.com/photo-1506744038136-46273834b3fb" download>⬇ Download</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1493244040629-496f6d136cc3" onclick="openPreview(this.src)">
<a class="btn" href="https://images.unsplash.com/photo-1493244040629-496f6d136cc3" download>⬇ Download</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" onclick="openPreview(this.src)">
<a class="btn" href="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" download>⬇ Download</a>
</div>

</div>

<!-- PREVIEW -->
<div id="previewBox">

<div class="iphone">

<div class="notch"></div>

<div class="status-bar">
<span>9:41</span>
<span>📶 🔋</span>
</div>

<img id="previewImg">

<div class="apps-grid">
<span>📞</span>
<span>💬</span>
<span>📷</span>
<span>🎵</span>
<span>🌐</span>
<span>📁</span>
<span>🛒</span>
<span>📺</span>
</div>

<div class="dock">
<span>📞</span>
<span>💬</span>
<span>🌐</span>
<span>📷</span>
</div>

</div>

<button onclick="closePreview()" class="close-btn">❌</button>

</div>

<script>

function openPreview(img){
    document.getElementById("previewBox").style.display="flex";
    document.getElementById("previewImg").src=img;
}

function closePreview(){
    document.getElementById("previewBox").style.display="none";
}

</script>

</body>
</html>
