function applyWallpaper(){
    if(currentWallpaper){

function display(){
let container=document.getElementById("wallpapers");
container.innerHTML="";

wallpapers.forEach((w,i)=>{
if(current=="all"||w.category==current){
let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<img src="${w.img}" onclick="openPreview('${w.img}')">
<button onclick="download('${w.img}')">⬇ Download</button>
<button onclick="like(this,${i})">❤️ Like</button>
`;

container.appendChild(div);
}
});
}

function filterCategory(cat){current=cat;display();}

function openPreview(img){
    document.getElementById("previewBox").style.display = "flex";
    document.getElementById("previewImg").src = img;

    currentWallpaper = img;

function openPage(page){
let content="";

if(page=="about"){
content=`<h2>About Us</h2>
<p>Welcome to WallNovaZone. We provide high quality 4K, AMOLED, Gaming and Live wallpapers for mobile users. Our goal is to deliver unique and attractive wallpapers for free.</p>`;

content=`<h2>Contact Us</h2>

<p>If you have any issue or suggestion, feel free to contact us.</p>`;
}

if(page=="privacy"){
content=`<h2>Privacy Policy</h2>

}

if(page=="terms"){
content=`<h2>Terms & Conditions</h2>
<p>All wallpapers are for personal use only. Users are responsible for how they use the content.</p>`;
}

document.getElementById("pageContent").innerHTML=content;
document.getElementById("pageBox").style.display="block";
}

function closePage(){
document.getElementById("pageBox").style.display="none";
}

   
   function closePreview(){
document.getElementById("previewBox").style.display="none";}

 function download(url) {
    fetch(url)
        .then(res => res.blob())
        .then(blob => {
            const a = document.createElement("a");
            const objectURL = URL.createObjectURL(blob);

            a.href = objectURL;
            a.download = "wallpaper";

            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            URL.revokeObjectURL(objectURL);
        })
        .catch(() => {
            alert("Download failed! Try again.");
        });


}

async function uploadMedia(){
    let file = document.getElementById("fileInput").files[0];

    if(!file){
        alert("File select karo!");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "ml_default");

    let res = await fetch("https://api.cloudinary.com/v1_1/dlxywzihp/upload", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    let url = data.secure_url;

   console.log(url); // check
  
   // AUTO ADD TO WEBSITE
    wallpapers.push({
        category: "live",
        img: url
    });
current = "all";
    display();

    alert("Upload successful 🔥");
}

   
function like(btn,id){
let liked=localStorage.getItem("liked_"+id);
if(liked){localStorage.removeItem("liked_"+id);btn.innerHTML="❤️ Like";}
else{localStorage.setItem("liked_"+id,true);btn.innerHTML="💖 Liked";}
}

// search

document.getElementById("search").addEventListener("keyup",function(){
let val=this.value.toLowerCase();
let cards=document.querySelectorAll(".card");
cards.forEach(card=>{
card.style.display=card.innerText.toLowerCase().includes(val)?"block":"none";
});
});

display();
